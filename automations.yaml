- id: '1769292243001'
  alias: Sterowanie zaworem przez przycisk
  trigger:
  - platform: state
    entity_id: sensor.akcja_przycisk
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.akcja_przycisk
        state: single_click
      sequence:
      - service: switch.turn_off
        target:
          entity_id: switch.zawor_wody_stan
    - conditions:
      - condition: state
        entity_id: sensor.akcja_przycisk
        state: double_click
      sequence:
      - service: switch.toggle
        target:
          entity_id: switch.zawor_wody_stan
- id: auto_off_valve
  alias: Auto-wyłączenie zaworu wody po 15 minutach
  description: Automatycznie wyłącza zawór wody po 15 minutach od włączenia.
  triggers:
  - trigger: state
    entity_id: switch.zawor_wody_stan
    to: 'on'
  actions:
  - wait_for_trigger:
    - trigger: state
      entity_id: switch.zawor_wody_stan
      to: 'off'
      for:
        minutes: 15
    timeout:
      minutes: 15
    continue_on_timeout: true
  - action: switch.turn_off
    target:
      entity_id: switch.zawor_wody_stan
  mode: restart
- id: auto_off_ac_master_bedroom
